<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BluTracker">
  <meta name="theme-color" content="#0d0d1a">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>BluTracker</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

<!-- ── HEADER ─────────────────────────── -->
<header class="header">
  <span class="header__title">🎬 BluTracker</span>
  <button class="header__menu-btn" id="btn-menu" aria-label="Meniu">
    <span></span><span></span><span></span>
  </button>
</header>

<!-- ── MAIN (scroll container) ─────────── -->
<main id="main">
  <div class="loading">
    <div class="spinner"></div>
    <p>Se încarcă colecția…</p>
  </div>
</main>

<!-- ── BOTTOM NAV ───────────────────────── -->
<nav class="nav">
  <button class="nav__item nav__item--active" data-tab="unwatched">
    <span class="nav__icon">📽</span>
    <span class="nav__label">Nevăzute</span>
  </button>
  <button class="nav__item" data-tab="watched">
    <span class="nav__icon">✓</span>
    <span class="nav__label">Văzute</span>
  </button>
  <button class="nav__item" data-tab="commentaries">
    <span class="nav__icon">🎙</span>
    <span class="nav__label">Comentarii</span>
  </button>
  <button class="nav__item" data-tab="features">
    <span class="nav__icon">🎞</span>
    <span class="nav__label">Extras</span>
  </button>
</nav>

<!-- ── DRAWER ───────────────────────────── -->
<div id="drawer-overlay" onclick="closeDrawer()"></div>
<aside id="drawer">
  <div class="drawer__section">
    <p class="drawer__label">Vizualizare</p>
    <div class="view-toggle">
      <button class="view-btn view-btn--active" id="view-grid-btn" onclick="setView('grid')">⊞ Grid</button>
      <button class="view-btn" id="view-list-btn" onclick="setView('list')">☰ Listă</button>
    </div>
  </div>
  <div class="drawer__section">
    <p class="drawer__label">Sortare</p>
    <button class="drawer__btn" id="drawer-sort-btn" onclick="closeDrawer();openSortSheet(S.tab)">
      <span id="drawer-sort-label">A → Z</span>
      <span class="drawer__btn-arrow">›</span>
    </button>
  </div>
  <div class="drawer__divider"></div>
  <div class="drawer__section">
    <button class="drawer__btn" onclick="closeDrawer();openSyncMenu()">
      ⟳ Actualizează colecția
    </button>
    <button class="drawer__btn" onclick="closeDrawer();openSetGithubToken()">
      🔑 GitHub Token
    </button>
  </div>
</aside>

<!-- ── MODAL ────────────────────────────── -->
<div id="overlay"><div id="modal"></div></div>

<!-- ── TOASTS ───────────────────────────── -->
<div id="toasts"></div>

<!-- ── FIREBASE ─────────────────────────── -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<!-- ── APP ──────────────────────────────── -->
<script src="js/config.js"></script>
<script src="js/db.js"></script>
<script src="js/app.js"></script>
</body>
</html>
